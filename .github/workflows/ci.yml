name: Test suite
on:
  workflow_dispatch:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
jobs:
  tests:
    name: "Python ${{ matrix.python-version }}"
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [ "3.10", "3.11", "3.12", "3.13", "3.14" ]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}
      - name: Sync dependencies
        run: uv sync --python ${{ matrix.python-version }} --group test --group cov
      - name: Pre-commit (ruff-check, ruff-format, base hooks)
        uses: pre-commit/action@v3.0.1
      - name: Lint
        run: uv run --python ${{ matrix.python-version }} mypy src/starlette_admin_fields
      - name: Test
        run: uv run --python ${{ matrix.python-version }} coverage run -m pytest tests
      - name: Coverage XML
        run: |
          uv run --python ${{ matrix.python-version }} coverage combine
          uv run --python ${{ matrix.python-version }} coverage xml
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage.xml
          flags: py${{ matrix.python-version }}
          fail_ci_if_error: false
  e2e:
    name: "E2E (Chromium)"
    runs-on: ubuntu-latest
    needs: [tests]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - name: Set up Python
        run: uv python install 3.13
      - name: Sync dependencies
        run: uv sync --python 3.13 --group e2e
      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('uv.lock') }}
      - name: Install Chromium
        run: uv run --python 3.13 playwright install --with-deps chromium
      - name: Run e2e tests
        run: uv run --python 3.13 pytest tests/e2e -m e2e -v --tracing retain-on-failure --screenshot only-on-failure --video retain-on-failure --output test-results
      - name: Upload Playwright artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-output
          path: test-results/
