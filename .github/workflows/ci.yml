name: Test suite
on:
  workflow_dispatch:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
jobs:
  tests:
    name: "Python ${{ matrix.python-version }}"
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: [ "3.10", "3.11", "3.12", "3.13", "3.14" ]
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true
      - name: Set up Python ${{ matrix.python-version }}
        run: uv python install ${{ matrix.python-version }}
      - name: Sync dependencies
        run: uv sync --python ${{ matrix.python-version }} --group test --group cov
      - name: Pre-commit (ruff-check, ruff-format, base hooks)
        uses: pre-commit/action@v3.0.1
      - name: Lint
        run: uv run --python ${{ matrix.python-version }} mypy src/starlette_admin_fields
      - name: Test
        run: uv run --python ${{ matrix.python-version }} coverage run -m pytest tests
      - name: Coverage XML
        run: uv run --python ${{ matrix.python-version }} coverage xml
      - name: Upload coverage to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: ./coverage.xml
          flags: py${{ matrix.python-version }}
          token: ${{ secrets.CODECOV_TOKEN }}
          fail_ci_if_error: false
